site_name: LOGYX — Documentación EPE
site_description: Documentación de la Evaluación del Perfil de Egreso (EPE) de LOGYX — Software, Gestión de TI e Infraestructura
site_author: Jorge Gutiérrez Miranda, Fabrizio Sánchez Saravia, Alex Coila Jarita
site_url: https://thereeds.github.io/ProyectoEPE-LOGYX/
repo_name: TheReeds/ProyectoEPE-LOGYX
repo_url: https://github.com/TheReeds/ProyectoEPE-LOGYX
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  icon:
    logo: material/truck-fast-outline
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search

extra:
  social: []

